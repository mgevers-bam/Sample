apiVersion: 1

datasources:
  - name: Mimir
    uid: mimir
    type: prometheus
    access: proxy
    url: http://mimir:9009/prometheus
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo

  - name: OpenSearch
    uid: opensearch
    type: grafana-opensearch-datasource
    access: proxy
    url: https://opensearch:9200
    editable: true
    jsonData:
      database: "otel-logs-*"
      flavor: opensearch
      version: 2.18.0
      tlsSkipVerify: true
      timeField: "@timestamp"
      logMessageField: body
      logLevelField: severityText
    secureJsonData:
      basicAuthPassword: Admin123!
    basicAuth: true
    basicAuthUser: admin

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: opensearch
        filterByTraceID: true
        filterBySpanID: true
      tracesToMetrics:
        datasourceUid: mimir
      serviceMap:
        datasourceUid: mimir
      nodeGraph:
        enabled: true
