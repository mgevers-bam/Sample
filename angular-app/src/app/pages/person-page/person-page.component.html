<mat-card>
  <mat-card-header>
    <mat-card-title>Create Person</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="createPersonForm" (ngSubmit)="onSubmit()">
      <mat-form-field appearance="fill">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" required />
      </mat-form-field>

      <fieldset>
        <legend>Transport Method</legend>
        <mat-radio-group formControlName="transportMethod">
          <mat-radio-button *ngFor="let method of transportMethods" [value]="method">
            {{ method }}
          </mat-radio-button>
        </mat-radio-group>
      </fieldset>

      <button mat-raised-button color="primary" type="submit" [disabled]="!createPersonForm.valid || isSubmitting">
        <span *ngIf="!isSubmitting">Create Person</span>
        <mat-spinner *ngIf="isSubmitting" diameter="24"></mat-spinner>
      </button>
    </form>
  </mat-card-content>
</mat-card>

<br />

<h1>Server Sent Events</h1>
<pre>{{ serverSentEvent$ | async | json }}</pre>

<br />

<h1>SignalR Events</h1>
<pre>{{ signalREvent$ | async | json }}</pre>
