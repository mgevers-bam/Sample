services:

  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=y
      - SA_PASSWORD=Password123!!

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    container_name: aspire-dashboard
    ports:
      - 18888:18888
      - 4317:18889
    environment:
       - CircuitOptions__DetailedErrors=true
       - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true 

  rabbitmq:
    container_name: rabbitmq
    image: masstransit/rabbitmq
    hostname: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest 

  stargate.api.1:
    image: ${DOCKER_REGISTRY-}stargateapi
    container_name: stargate.api.1
    build:
      context: .
      dockerfile: Stargate/src/Stargate.Api/Dockerfile
    depends_on:
        - sql-server
        - rabbitmq 
    ports:
      - "5001:5001"
    environment:
      ASPNETCORE_URLS: http://+:5001
      OTEL_TRACES_SAMPLER: "always_on"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "stargate-api-1"

  stargate.api.2:
    image: ${DOCKER_REGISTRY-}stargateapi
    container_name: stargate.api.2
    build:
      context: .
      dockerfile: Stargate/src/Stargate.Api/Dockerfile
    depends_on:
        - sql-server
        - rabbitmq
    ports:
      - "5002:5002"
    environment:
      ASPNETCORE_URLS: http://+:5002
      OTEL_TRACES_SAMPLER: "always_on"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "stargate-api-2"

  stargate.message.processor:
    image: ${DOCKER_REGISTRY-}stargateapi
    container_name: stargate.message.processor
    build:
      context: .
      dockerfile: Stargate/src/Stargate.MessageProcessor/Dockerfile
    depends_on:
        - sql-server
        - rabbitmq 
    environment:
      OTEL_TRACES_SAMPLER: "always_on"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      OTEL_SERVICE_NAME: "stargate-message-processor"
