services:

  # PostgreSQL
  postgres:
    image: postgres:17
    container_name: postgres
    user: root
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Password123!!
      - POSTGRES_DB=auth
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # Sql Server
  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server
    user: root
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=y
      - SA_PASSWORD=Password123!!
      - MSSQL_DATA_DIR=/var/opt/mssql/data
      - MSSQL_LOG_DIR=/var/opt/mssql/log
      - MSSQL_BACKUP_DIR=/var/opt/mssql/backup
    volumes:
      - ./sqlserver/data:/var/opt/mssql/data
      - ./sqlserver/log:/var/opt/mssql/log
      - ./sqlserver/secrets:/var/opt/mssql/secrets
      - ./sqlserver/backup:/var/opt/mssql/backup

  # Aspire Dashboard - .NET development dashboard
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:13.2
    container_name: aspire-dashboard
    ports:
      - 18888:18888 # Aspire UI
      - 18891:18891 # MCP Server
    environment:
      - CircuitOptions__DetailedErrors=true
      - DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true
      - Dashboard__Mcp__Enabled=true
      - Dashboard__Mcp__EndpointUrl=http://0.0.0.0:18891
      - Dashboard__Mcp__ExternalEndpointUrl=http://localhost:18891

  # Grafana Alloy - OpenTelemetry collector (Grafana's distribution)
  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    command: ["run", "/etc/alloy/config.alloy", "--server.http.listen-addr=0.0.0.0:12345"]
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "12345:12345" # Alloy UI
    depends_on:
      - tempo
      - data-prepper
      - mimir
      - aspire-dashboard

  # Grafana Tempo - distributed tracing backend
  tempo:
    image: grafana/tempo:2.4.2
    container_name: tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP API
      - "9095:9095"   # Tempo gRPC

  # OpenSearch Data Prepper - ingestion pipeline for OpenSearch
  data-prepper:
    image: opensearchproject/data-prepper:latest
    container_name: data-prepper
    volumes:
      - ./data-prepper-config.yaml:/usr/share/data-prepper/pipelines/pipelines.yaml:ro
      - ./data-prepper-settings.yaml:/usr/share/data-prepper/config/data-prepper-config.yaml:ro
    ports:
      - "21891:21891"   # OTLP gRPC
      - "21892:21892"   # OTLP HTTP
    depends_on:
      - opensearch

  # OpenSearch - log aggregation and search
  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin123!
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"

  # OpenSearch Dashboards - visualization for OpenSearch
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["https://opensearch:9200"]
    depends_on:
      - opensearch

  # Grafana Mimir - scalable metrics backend
  mimir:
    image: grafana/mimir:latest
    container_name: mimir
    command: ["-config.file=/etc/mimir/mimir.yaml"]
    volumes:
      - ./mimir-config.yaml:/etc/mimir/mimir.yaml:ro
      - mimir-data:/data
    ports:
      - "9009:9009"

  # Grafana - visualization dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./grafana-dashboards:/etc/grafana/provisioning/dashboards/json:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_INSTALL_PLUGINS=grafana-opensearch-datasource
    depends_on:
      - mimir
      - tempo
      - opensearch

  # rabbitmq
  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3-management
    hostname: rabbitmq
    ports:
      - 5672:5672
      - 15672:15672
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  authentication.application.api:
    image: ${DOCKER_REGISTRY-}authenticationapplicationapi
    container_name: authentication.api
    build:
      context: .
      dockerfile: Authentication/src/Authentication.Application.Api/Dockerfile
    depends_on:
        - postgres
        - alloy
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_HTTP_PORTS: 5000
      OTEL_TRACES_SAMPLER: "always_on"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4317"
      OTEL_SERVICE_NAME: "authentication-api"

  stargate.api.1:
    image: ${DOCKER_REGISTRY-}stargateapi
    container_name: stargate.api.1
    build:
      context: .
      dockerfile: Stargate/src/Stargate.Api/Dockerfile
    depends_on:
        - sql-server
        - rabbitmq
        - alloy
    ports:
      - "5001:5001"
    environment:
      ASPNETCORE_HTTP_PORTS: 5001
      OTEL_TRACES_SAMPLER: "always_on"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4317"
      OTEL_SERVICE_NAME: "stargate-api-1"

  stargate.api.2:
    image: ${DOCKER_REGISTRY-}stargateapi
    container_name: stargate.api.2
    build:
      context: .
      dockerfile: Stargate/src/Stargate.Api/Dockerfile
    depends_on:
        - sql-server
        - rabbitmq
        - alloy
    ports:
      - "5002:5002"
    environment:
      ASPNETCORE_HTTP_PORTS: 5002
      OTEL_TRACES_SAMPLER: "always_on"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4317"
      OTEL_SERVICE_NAME: "stargate-api-2"

  stargate.message.processor:
    image: ${DOCKER_REGISTRY-}stargatemessageprocessor
    container_name: stargate.message.processor
    build:
      context: .
      dockerfile: Stargate/src/Stargate.MessageProcessor/Dockerfile
    depends_on:
        - sql-server
        - rabbitmq
        - alloy
    environment:
      OTEL_TRACES_SAMPLER: "always_on"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4317"
      OTEL_SERVICE_NAME: "stargate-message-processor"

  communications.api:
    image: ${DOCKER_REGISTRY-}communicationsapi
    container_name: communications.api
    build:
      context: .
      dockerfile: Communications/src/Communications.Api/Dockerfile
    depends_on:
        - alloy
    ports:
      - "5003:5003"
    environment:
      ASPNETCORE_HTTP_PORTS: 5003
      OTEL_TRACES_SAMPLER: "always_on"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy:4317"
      OTEL_SERVICE_NAME: "communications-api"

volumes:
  opensearch-data:
  tempo-data:
  mimir-data:
  grafana-data:
